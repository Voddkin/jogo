<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voddkin Labs - V1 Core</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-container">
        <!-- Canvas container for flexible aspect ratio letterboxing -->
        <div id="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>

            <!-- Overlay for Level Complete -->
            <div id="overlay-message" class="hidden">
                <h1 id="overlay-text">Level Complete!</h1>
                <button id="btn-next-level" class="btn-action">Next Level</button>
            </div>
        </div>

        <div id="ui-container">
            <h2 id="level-name">Loading...</h2>

            <div id="controls">
                <button class="btn-cmd btn-forward" onclick="window.addCommand('MOVE_FORWARD')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M213.66,122.34a8,8,0,0,1-11.32,11.32L136,67.31V216a8,8,0,0,1-16,0V67.31L53.66,133.66a8,8,0,0,1-11.32-11.32l80-80a8,8,0,0,1,11.32,0Z"></path></svg>
                    Forward
                </button>
                <button class="btn-cmd btn-backward" onclick="window.addCommand('MOVE_BACKWARD')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M205.66,149.66l-80,80a8,8,0,0,1-11.32,0l-80-80a8,8,0,0,1,11.32-11.32L120,212.69V40a8,8,0,0,1,16,0V212.69l74.34-74.35a8,8,0,0,1,11.32,11.32Z"></path></svg>
                    Backward
                </button>
                <button class="btn-cmd btn-turn" onclick="window.addCommand('TURN_LEFT')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M224,128a96,96,0,0,1-94.71,96H128A95.38,95.38,0,0,1,62.1,196.4a8,8,0,1,1,11.8-10.8A79.44,79.44,0,0,0,128,208h1.07A80,80,0,0,0,128,48h-8.8l20.4,20.4a8,8,0,0,1-11.32,11.31l-34.34-34.34a8,8,0,0,1,0-11.32l34.34-34.34a8,8,0,0,1,11.32,11.32L119.2,32H128A96.11,96.11,0,0,1,224,128Z"></path></svg>
                    Left
                </button>
                <button class="btn-cmd btn-turn" onclick="window.addCommand('TURN_RIGHT')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M193.9,196.4a8,8,0,1,1-11.8-10.8A79.44,79.44,0,0,0,128,208h-1.07A80,80,0,0,1,128,48h8.8L115.33,68.4a8,8,0,0,0,11.32,11.31l34.34-34.34a8,8,0,0,0,0-11.32l-34.34-34.34a8,8,0,0,0-11.32,11.32L136.8,32H128A96,96,0,0,0,128,224h1.29A95.38,95.38,0,0,0,193.9,196.4Z"></path></svg>
                    Right
                </button>
                <button class="btn-cmd btn-emp" onclick="window.addCommand('ACTIVATE_EMP')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M215.79,118.17a8,8,0,0,0-5-5.66L153.18,90.9l14.66-73.33a8,8,0,0,0-13.69-7l-112,120a8,8,0,0,0,3,13l57.63,21.61L88.16,238.43a8,8,0,0,0,13.69,7l112-120A8,8,0,0,0,215.79,118.17ZM109.37,214l10.47-52.38a8,8,0,0,0-5-9.06L62,132.71l84.62-90.66L136.16,94.43a8,8,0,0,0,5,9.06l52.8,19.8Z"></path></svg>
                    EMP
                </button>
            </div>

            <div id="timeline-container">
                <div id="queue-display" class="empty">Timeline is empty</div>
            </div>

            <div id="action-controls">
                <button onclick="window.executeQueue()" id="btn-execute" class="btn-action btn-play">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M228.23,114.78l-144-88A16,16,0,0,0,60,40V216a16,16,0,0,0,24.23,13.78l144-88A16,16,0,0,0,228.23,114.78ZM76,204.62V51.38L201.35,128Z"></path></svg>
                    Execute
                </button>
                <button onclick="window.clearQueue()" id="btn-clear" class="btn-action">✖ Clear</button>
                <button onclick="window.resetLevel()" id="btn-reset" class="btn-action">↺ Reset Level</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
