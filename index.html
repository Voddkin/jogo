<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voddkin Labs - Greybox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-container">
            <h2 id="level-name">Loading...</h2>

            <div id="controls">
                <button class="btn-cmd btn-forward" onclick="addCommand('MOVE_FORWARD')">⬆️ Forward</button>
                <button class="btn-cmd btn-backward" onclick="addCommand('MOVE_BACKWARD')">⬇️ Backward</button>
                <button class="btn-cmd btn-turn" onclick="addCommand('TURN_LEFT')">🔄 Left</button>
                <button class="btn-cmd btn-turn" onclick="addCommand('TURN_RIGHT')">🔄 Right</button>
                <button class="btn-cmd btn-emp" onclick="addCommand('ACTIVATE_EMP')">⚡ EMP</button>
            </div>

            <div id="timeline-container">
                <div id="queue-display" class="empty">Timeline is empty</div>
            </div>

            <div id="action-controls">
                <button onclick="executeQueue()" id="btn-execute" class="btn-action btn-play">▶ Execute</button>
                <button onclick="clearQueue()" id="btn-clear" class="btn-action">✖ Clear</button>
                <button onclick="resetLevel()" id="btn-reset" class="btn-action">↺ Reset Level</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
